<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sofia Books — Upload Documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>*{box-sizing:border-box;}html,body{margin:0;height:100%;-webkit-font-smoothing:antialiased;}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px;}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel">
const {useState}=React;
const T={
  sofia:{surface:"#F6F1E9",card:"#FFFFFF",cardAlt:"#FBF7F1",ink:"#2A2433",muted:"#8A8295",faint:"#B4AEC0",line:"#ECE4D8",lineSoft:"#F2EBE0",primary:"#E2568C",primaryDeep:"#C53C76",primarySoft:"#FBE6EF",chipBg:"#F6F1E9",navBg:"rgba(255,255,255,0.88)",shadow:"0 1px 2px rgba(42,28,60,.04),0 14px 34px -18px rgba(42,28,60,.18)",tiers:{review:{fg:"#C2553D",bg:"#F7E5DD",ring:"#EBCBBE"},check:{fg:"#A9791A",bg:"#F6ECD4",ring:"#E8D5A6"},ready:{fg:"#3C8E6C",bg:"#DEEEE5",ring:"#BCDFCD"},pending:{fg:"#6A5ECF",bg:"#E9E3F8",ring:"#D3C9EF"}}},
  yoda:{surface:"#13111C",card:"#1C1928",cardAlt:"#211D2E",ink:"#ECEAF2",muted:"#9A93AE",faint:"#6E6880",line:"#2C2838",lineSoft:"#252132",primary:"#7C9CFF",primaryDeep:"#5B7CF0",primarySoft:"rgba(124,156,255,.14)",chipBg:"#211D2E",navBg:"rgba(22,20,32,0.85)",shadow:"0 1px 2px rgba(0,0,0,.3),0 18px 40px -20px rgba(0,0,0,.6)",tiers:{review:{fg:"#F0987B",bg:"rgba(225,120,90,.15)",ring:"rgba(225,120,90,.32)"},check:{fg:"#E8C06B",bg:"rgba(220,175,80,.14)",ring:"rgba(220,175,80,.30)"},ready:{fg:"#6FD6A6",bg:"rgba(80,200,150,.14)",ring:"rgba(80,200,150,.30)"},pending:{fg:"#A6B7FF",bg:"rgba(124,156,255,.16)",ring:"rgba(124,156,255,.34)"}}},
};
function Icon({name,size=18,stroke=1.7,style,color}){
  const p={fill:"none",stroke:color||"currentColor",strokeWidth:stroke,strokeLinecap:"round",strokeLinejoin:"round"};
  const paths={upload:<><path d="M4 17v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 3v12M7 8l5-5 5 5" {...p}/></>,docs:<><path d="M5 4h10l4 4v12a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z" {...p}/><path d="M14 4v4h4M8 13h8M8 17h5" {...p}/></>,dashboard:<><rect x="3" y="3" width="7" height="9" rx="1.5" {...p}/><rect x="14" y="3" width="7" height="5" rx="1.5" {...p}/><rect x="14" y="12" width="7" height="9" rx="1.5" {...p}/><rect x="3" y="16" width="7" height="5" rx="1.5" {...p}/></>,reports:<><path d="M5 19V5M5 19h14" {...p}/><path d="M9 15v-3M13 15V9M17 15v-5" {...p}/></>,bell:<><path d="M6 9a6 6 0 1112 0c0 5 2 6 2 6H4s2-1 2-6z" {...p}/><path d="M10 20a2 2 0 004 0" {...p}/></>,chevron:<><path d="M6 9l6 6 6-6" {...p}/></>,arrow:<><path d="M5 12h14M13 6l6 6-6 6" {...p}/></>,image:<><rect x="3" y="3" width="18" height="18" rx="2" {...p}/><circle cx="8.5" cy="8.5" r="1.5" {...p}/><path d="M21 15l-5-5L5 21" {...p}/></>,file:<><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" {...p}/><path d="M14 2v6h6" {...p}/></>,clock:<><circle cx="12" cy="12" r="9" {...p}/><path d="M12 7v5l3 2" {...p}/></>,};
  return <svg viewBox="0 0 24 24" width={size} height={size} style={style}>{paths[name]||null}</svg>;
}
const NAV_CLIENT=[{l:"Dashboard",i:"dashboard"},{l:"Upload",i:"upload",active:true},{l:"Documents",i:"docs"},{l:"Reports",i:"reports"}];
function Nav({t,theme,setTheme,items=NAV_CLIENT}){
  return(
    <header style={{display:"flex",alignItems:"center",gap:20,padding:"0 36px",height:70,borderBottom:`1px solid ${t.line}`,background:t.navBg,backdropFilter:"blur(12px)",flex:"none",transition:"background .5s"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{width:32,height:32,borderRadius:10,display:"grid",placeItems:"center",background:`linear-gradient(150deg,${t.primary},${t.primaryDeep})`,flex:"none"}}>
          <svg viewBox="0 0 24 24" width={18} height={18}><circle cx="12" cy="14.6" r="5.1" fill="#fff"/><circle cx="6.4" cy="8.6" r="2.25" fill="#fff"/><circle cx="12" cy="6.1" r="2.25" fill="#fff"/><circle cx="17.6" cy="8.6" r="2.25" fill="#fff"/></svg>
        </span>
        <span style={{fontFamily:"'Bricolage Grotesque'",fontWeight:700,fontSize:16,color:t.ink}}>Sofia Books</span>
      </div>
      <nav style={{display:"flex",gap:3,marginLeft:6}}>
        {items.map(n=><span key={n.l} style={{padding:"7px 13px",borderRadius:10,fontSize:13.5,fontWeight:n.active?700:600,cursor:"pointer",color:n.active?t.primary:t.muted,background:n.active?t.primarySoft:"transparent"}}>{n.l}</span>)}
      </nav>
      <div style={{flex:1}}/>
      <div style={{position:"relative",display:"flex",padding:4,borderRadius:999,background:theme==="sofia"?"#EFE7DA":"#211D2E",border:`1px solid ${t.line}`}}>
        <span style={{position:"absolute",top:4,bottom:4,width:"calc(50% - 4px)",borderRadius:999,background:`linear-gradient(150deg,${t.primary},${t.primaryDeep})`,left:4,transform:theme==="sofia"?"translateX(0)":"translateX(100%)",transition:"transform .32s cubic-bezier(.34,1.3,.5,1)"}}/>
        {["sofia","yoda"].map(k=><button key={k} onClick={()=>setTheme(k)} style={{position:"relative",zIndex:2,border:0,background:"transparent",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,padding:"5px 14px",borderRadius:999,color:theme===k?"#fff":t.muted,transition:"color .25s"}}>{k==="sofia"?"Sofia":"Yoda"}</button>)}
      </div>
      <button style={{width:38,height:38,borderRadius:10,border:`1px solid ${t.line}`,background:t.card,color:t.muted,display:"grid",placeItems:"center",cursor:"pointer",position:"relative"}}>
        <Icon name="bell" size={18}/><span style={{position:"absolute",top:9,right:9,width:6,height:6,borderRadius:999,background:t.primary,border:`2px solid ${t.card}`}}/>
      </button>
      <span style={{width:36,height:36,borderRadius:10,display:"grid",placeItems:"center",fontSize:12,fontWeight:800,color:t.primary,background:t.primarySoft,border:`1px solid ${t.line}`}}>MS</span>
    </header>
  );
}
function SCard({t,label,value,note,color}){
  return(
    <div style={{flex:1,background:t.card,border:`1px solid ${t.line}`,borderRadius:16,padding:"16px 20px",boxShadow:t.shadow,transition:"background .5s"}}>
      <div style={{fontSize:11,fontWeight:700,color:t.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>{label}</div>
      <div style={{fontFamily:"'Bricolage Grotesque'",fontWeight:800,fontSize:26,letterSpacing:"-.025em",color:color||t.ink,lineHeight:1}}>{value}</div>
      {note&&<div style={{fontSize:12,color:t.faint,marginTop:5}}>{note}</div>}
    </div>
  );
}
const STATUS_TIER={"In Review":"review","Approved":"ready","Pending":"pending","Processing":"pending","Parked":"check"};
function StatusChip({t,s}){const c=t.tiers[STATUS_TIER[s]||"pending"];return <span style={{display:"inline-flex",alignItems:"center",padding:"4px 12px",borderRadius:999,fontSize:12.5,fontWeight:700,color:c.fg,background:c.bg,border:`1px solid ${c.ring}`}}>{s}</span>;}
function SourceChip({t,s}){const manual=s==="Manual";const c=manual?t.tiers.pending:{bg:t.chipBg,fg:t.muted,ring:t.line};return <span style={{display:"inline-flex",padding:"3px 10px",borderRadius:8,fontSize:12.5,fontWeight:600,background:c.bg,color:c.fg,border:`1px solid ${c.ring}`}}>{s}</span>;}

const IN_PROGRESS=[
  {ref:"MNL-0011",src:"Manual",date:"Jun 3",in_:"₱400.00",out:null,st:"In Review"},
  {ref:"DEMO-9982341",src:"Upload",date:"Jun 3",in_:null,out:null,st:"Processing"},
  {ref:"MNL-0010",src:"Manual",date:"Jun 2",in_:null,out:"₱600.00",st:"In Review"},
];
const GW="1.9fr 0.72fr 0.6fr 0.85fr 0.85fr 0.9fr";

function UploadPage(){
  const [theme,setTheme]=useState("sofia");
  const t=T[theme];
  return(
    <div style={{height:"100%",width:"100%",background:t.surface,color:t.ink,fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",transition:"background .5s,color .5s",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <Nav t={t} theme={theme} setTheme={setTheme}/>
      <div style={{flex:1,overflowY:"auto",background:t.surface}}>
      <div style={{maxWidth:1280,margin:"0 auto",padding:"28px 36px"}}>

        {/* Breadcrumb */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:18,fontSize:13,color:t.muted}}>
          <span style={{cursor:"pointer"}}>My Business</span>
          <Icon name="chevron" size={13} style={{transform:"rotate(-90deg)",color:t.faint}}/>
          <span style={{fontWeight:600,color:t.ink}}>Upload Documents</span>
        </div>

        {/* Header */}
        <div style={{marginBottom:22}}>
          <h1 style={{fontFamily:"'Bricolage Grotesque'",fontWeight:800,fontSize:34,letterSpacing:"-.025em",margin:0,color:t.ink}}>Upload Documents</h1>
          <p style={{margin:"5px 0 0",color:t.muted,fontSize:14.5}}>Drop files into the correct zone below</p>
        </div>

        {/* Summary cards */}
        <div style={{display:"flex",gap:14,marginBottom:22}}>
          <SCard t={t} label="Income This Month" value="8" note="files uploaded" color={t.tiers.ready.fg}/>
          <SCard t={t} label="Expense This Month" value="5" note="files uploaded" color={t.tiers.review.fg}/>
          <SCard t={t} label="In Progress" value="3" note="processing or in review" color={t.tiers.check.fg}/>
        </div>

        {/* Upload zones */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          {[
            {label:"Income",sub:"Sales receipts, invoices received",arrow:"↑",bg:"#DCFCE7",fg:"#15803D"},
            {label:"Expense",sub:"Purchase receipts, utility bills",arrow:"↓",bg:"#FEE2E2",fg:"#B91C1C"},
          ].map(z=>(
            <div key={z.label} style={{background:t.card,border:`1px solid ${t.line}`,borderRadius:18,overflow:"hidden",boxShadow:t.shadow}}>
              {/* Zone header */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",borderBottom:`1px solid ${t.line}`}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{width:32,height:32,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,background:z.bg,color:z.fg,flex:"none"}}>{z.arrow}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:t.ink,fontFamily:"'Bricolage Grotesque'"}}>{z.label}</div>
                    <div style={{fontSize:11,color:t.muted,marginTop:1}}>{z.sub}</div>
                  </div>
                </div>
                <span style={{fontSize:10.5,fontWeight:700,background:z.bg,color:z.fg,padding:"2px 10px",borderRadius:999}}>{z.label==="Income"?"8 files":"5 files"}</span>
              </div>
              {/* Drop area */}
              <div style={{margin:12,border:`1.5px dashed ${t.line}`,borderRadius:11,padding:"28px 20px",textAlign:"center",background:t.surface,cursor:"pointer"}}>
                <div style={{width:40,height:40,borderRadius:10,background:t.card,border:`1px solid ${t.line}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",color:t.muted}}>
                  <Icon name="upload" size={20}/>
                </div>
                <div style={{fontSize:12.5,fontWeight:700,color:t.ink,marginBottom:4}}>Drop file here or click to browse</div>
                <div style={{fontSize:11,color:t.muted,marginBottom:14}}>Upload your {z.label.toLowerCase()} document</div>
                <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                  <button style={{fontSize:11,fontWeight:600,padding:"6px 14px",borderRadius:8,background:t.card,border:`1px solid ${t.line}`,color:t.ink,cursor:"pointer"}}>Browse files</button>
                  <button style={{fontSize:11,fontWeight:600,padding:"6px 14px",borderRadius:8,background:t.card,border:`1px solid ${t.line}`,color:t.ink,cursor:"pointer"}}>Take photo</button>
                </div>
              </div>
              <div style={{fontSize:10,color:t.faint,textAlign:"center",margin:"0 12px 12px",paddingBottom:2}}>Accepts JPG, PNG, PDF · max 10 MB</div>
            </div>
          ))}
        </div>

        {/* Enter manually CTA */}
        <button style={{width:"100%",padding:"14px",borderRadius:13,fontSize:13.5,fontWeight:700,color:"#fff",border:0,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:`linear-gradient(150deg,${t.primary},${t.primaryDeep})`,boxShadow:`0 10px 22px -12px ${t.primaryDeep}`,marginBottom:28}}>
          No physical receipt? Enter manually <Icon name="arrow" size={16} color="#fff"/>
        </button>

        {/* In Progress table */}
        <div style={{background:t.card,border:`1px solid ${t.line}`,borderRadius:20,overflow:"hidden",boxShadow:t.shadow}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"18px 24px",borderBottom:`1px solid ${t.line}`}}>
            <span style={{color:t.tiers.check.fg}}><Icon name="clock" size={18}/></span>
            <span style={{fontFamily:"'Bricolage Grotesque'",fontWeight:700,fontSize:16,color:t.ink}}>In Progress</span>
            <span style={{fontSize:11.5,fontWeight:800,color:t.tiers.check.fg,background:t.tiers.check.bg,padding:"2px 8px",borderRadius:999,border:`1px solid ${t.tiers.check.ring}`}}>3</span>
            <span style={{fontSize:12,color:t.faint,marginLeft:4}}>Posted items removed automatically · Click a row for details</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:GW,padding:"12px 24px",fontSize:11,fontWeight:700,color:t.faint,textTransform:"uppercase",letterSpacing:".06em"}}>
            <span>Reference</span><span>Source</span><span>Uploaded</span><span style={{color:t.tiers.ready.fg}}>Inflow</span><span style={{color:t.tiers.review.fg}}>Outflow</span><span>Status</span>
          </div>
          {IN_PROGRESS.map((d,i)=>(
            <div key={d.ref} style={{display:"grid",gridTemplateColumns:GW,padding:"13px 24px",alignItems:"center",borderTop:`1px solid ${t.lineSoft}`,background:i%2===0?t.cardAlt:"transparent",cursor:"pointer"}}>
              <span style={{fontWeight:600,fontSize:13.5,color:t.ink}}>{d.ref}</span>
              <span><SourceChip t={t} s={d.src}/></span>
              <span style={{fontSize:13.5,color:t.muted}}>{d.date}</span>
              <span style={{fontSize:13.5,fontWeight:600,color:d.in_?t.tiers.ready.fg:t.faint}}>{d.in_||"—"}</span>
              <span style={{fontSize:13.5,fontWeight:600,color:d.out?t.tiers.review.fg:t.faint}}>{d.out||"—"}</span>
              <span><StatusChip t={t} s={d.st}/></span>
            </div>
          ))}
        </div>
        <div style={{height:32}}/>
      </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<UploadPage/>);
</script>
</body>
</html>
