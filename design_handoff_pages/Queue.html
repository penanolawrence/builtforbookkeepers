<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sofia Books — Review Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>*{box-sizing:border-box;}html,body{margin:0;height:100%;-webkit-font-smoothing:antialiased;}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px;}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel">
const {useState}=React;
const T={
  sofia:{surface:"#F6F1E9",card:"#FFFFFF",cardAlt:"#FBF7F1",ink:"#2A2433",muted:"#8A8295",faint:"#B4AEC0",line:"#ECE4D8",lineSoft:"#F2EBE0",primary:"#E2568C",primaryDeep:"#C53C76",primarySoft:"#FBE6EF",chipBg:"#F6F1E9",navBg:"rgba(255,255,255,0.88)",shadow:"0 1px 2px rgba(42,28,60,.04),0 14px 34px -18px rgba(42,28,60,.18)",tiers:{review:{fg:"#C2553D",bg:"#F7E5DD",ring:"#EBCBBE"},check:{fg:"#A9791A",bg:"#F6ECD4",ring:"#E8D5A6"},ready:{fg:"#3C8E6C",bg:"#DEEEE5",ring:"#BCDFCD"},pending:{fg:"#6A5ECF",bg:"#E9E3F8",ring:"#D3C9EF"}}},
  yoda:{surface:"#13111C",card:"#1C1928",cardAlt:"#211D2E",ink:"#ECEAF2",muted:"#9A93AE",faint:"#6E6880",line:"#2C2838",lineSoft:"#252132",primary:"#7C9CFF",primaryDeep:"#5B7CF0",primarySoft:"rgba(124,156,255,.14)",chipBg:"#211D2E",navBg:"rgba(22,20,32,0.85)",shadow:"0 1px 2px rgba(0,0,0,.3),0 18px 40px -20px rgba(0,0,0,.6)",tiers:{review:{fg:"#F0987B",bg:"rgba(225,120,90,.15)",ring:"rgba(225,120,90,.32)"},check:{fg:"#E8C06B",bg:"rgba(220,175,80,.14)",ring:"rgba(220,175,80,.30)"},ready:{fg:"#6FD6A6",bg:"rgba(80,200,150,.14)",ring:"rgba(80,200,150,.30)"},pending:{fg:"#A6B7FF",bg:"rgba(124,156,255,.16)",ring:"rgba(124,156,255,.34)"}}},
};
function Icon({name,size=18,stroke=1.7,style,color}){
  const p={fill:"none",stroke:color||"currentColor",strokeWidth:stroke,strokeLinecap:"round",strokeLinejoin:"round"};
  const paths={queue:<><path d="M4 6h16M4 12h16M4 18h10" {...p}/></>,dashboard:<><rect x="3" y="3" width="7" height="9" rx="1.5" {...p}/><rect x="14" y="3" width="7" height="5" rx="1.5" {...p}/><rect x="14" y="12" width="7" height="9" rx="1.5" {...p}/><rect x="3" y="16" width="7" height="5" rx="1.5" {...p}/></>,entries:<><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" {...p}/><path d="M14 2v6h6" {...p}/></>,clients:<><circle cx="9" cy="8" r="3.2" {...p}/><path d="M3.5 19c.8-3 3-4.6 5.5-4.6S13.7 16 14.5 19" {...p}/></>,reports:<><path d="M5 19V5M5 19h14" {...p}/><path d="M9 15v-3M13 15V9M17 15v-5" {...p}/></>,bell:<><path d="M6 9a6 6 0 1112 0c0 5 2 6 2 6H4s2-1 2-6z" {...p}/><path d="M10 20a2 2 0 004 0" {...p}/></>,chevron:<><path d="M6 9l6 6 6-6" {...p}/></>,arrow:<><path d="M5 12h14M13 6l6 6-6 6" {...p}/></>,check:<><path d="M20 6L9 17l-5-5" {...p}/></>,flag:<><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" {...p}/><line x1="4" y1="22" x2="4" y2="15" {...p}/></>,};
  return <svg viewBox="0 0 24 24" width={size} height={size} style={style}>{paths[name]||null}</svg>;
}
const NAV_ACCT=[{l:"Dashboard",i:"dashboard"},{l:"Queue",i:"queue",active:true,badge:12},{l:"Adj. Entries",i:"entries"},{l:"My Clients",i:"clients"},{l:"Reports",i:"reports"}];
function Nav({t,theme,setTheme}){
  return(
    <header style={{display:"flex",alignItems:"center",gap:20,padding:"0 36px",height:70,borderBottom:`1px solid ${t.line}`,background:t.navBg,backdropFilter:"blur(12px)",flex:"none",transition:"background .5s"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{width:32,height:32,borderRadius:10,display:"grid",placeItems:"center",background:`linear-gradient(150deg,${t.primary},${t.primaryDeep})`,flex:"none"}}>
          <svg viewBox="0 0 24 24" width={18} height={18}><circle cx="12" cy="14.6" r="5.1" fill="#fff"/><circle cx="6.4" cy="8.6" r="2.25" fill="#fff"/><circle cx="12" cy="6.1" r="2.25" fill="#fff"/><circle cx="17.6" cy="8.6" r="2.25" fill="#fff"/></svg>
        </span>
        <span style={{fontFamily:"'Bricolage Grotesque'",fontWeight:700,fontSize:16,color:t.ink}}>Sofia Books</span>
      </div>
      <nav style={{display:"flex",gap:3,marginLeft:6}}>
        {NAV_ACCT.map(n=>(
          <span key={n.l} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 13px",borderRadius:10,fontSize:13.5,fontWeight:n.active?700:600,cursor:"pointer",color:n.active?t.primary:t.muted,background:n.active?t.primarySoft:"transparent"}}>
            {n.l}{n.badge&&<span style={{fontSize:10.5,fontWeight:800,color:"#fff",background:t.tiers.review.fg,borderRadius:999,padding:"1px 6px"}}>{n.badge}</span>}
          </span>
        ))}
      </nav>
      <div style={{flex:1}}/>
      <div style={{position:"relative",display:"flex",padding:4,borderRadius:999,background:theme==="sofia"?"#EFE7DA":"#211D2E",border:`1px solid ${t.line}`}}>
        <span style={{position:"absolute",top:4,bottom:4,width:"calc(50% - 4px)",borderRadius:999,background:`linear-gradient(150deg,${t.primary},${t.primaryDeep})`,left:4,transform:theme==="sofia"?"translateX(0)":"translateX(100%)",transition:"transform .32s cubic-bezier(.34,1.3,.5,1)"}}/>
        {["sofia","yoda"].map(k=><button key={k} onClick={()=>setTheme(k)} style={{position:"relative",zIndex:2,border:0,background:"transparent",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,padding:"5px 14px",borderRadius:999,color:theme===k?"#fff":t.muted,transition:"color .25s"}}>{k==="sofia"?"Sofia":"Yoda"}</button>)}
      </div>
      <button style={{width:38,height:38,borderRadius:10,border:`1px solid ${t.line}`,background:t.card,color:t.muted,display:"grid",placeItems:"center",cursor:"pointer",position:"relative"}}>
        <Icon name="bell" size={18}/><span style={{position:"absolute",top:9,right:9,width:6,height:6,borderRadius:999,background:t.primary,border:`2px solid ${t.card}`}}/>
      </button>
      <span style={{width:36,height:36,borderRadius:10,display:"grid",placeItems:"center",fontSize:12,fontWeight:800,color:t.primary,background:t.primarySoft,border:`1px solid ${t.line}`}}>MS</span>
    </header>
  );
}
function SCard({t,label,value,note,color}){return(<div style={{flex:1,background:t.card,border:`1px solid ${t.line}`,borderRadius:16,padding:"16px 20px",boxShadow:t.shadow,transition:"background .5s"}}><div style={{fontSize:11,fontWeight:700,color:t.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>{label}</div><div style={{fontFamily:"'Bricolage Grotesque'",fontWeight:800,fontSize:26,letterSpacing:"-.025em",color:color||t.ink,lineHeight:1}}>{value}</div>{note&&<div style={{fontSize:12,color:t.faint,marginTop:5}}>{note}</div>}</div>);}

const FLAG_STYLE={RED:{bg:"#FEE2E2",fg:"#B91C1C",label:"⚠ RED"},YELLOW:{bg:"#FEF3C7",fg:"#92400E",label:"● YEL"},GREEN:{bg:"#DCFCE7",fg:"#166534",label:"✓ GRN"}};
function FlagChip({flag}){const s=FLAG_STYLE[flag];return <span style={{display:"inline-flex",padding:"3px 9px",borderRadius:8,fontSize:12,fontWeight:700,background:s.bg,color:s.fg}}>{s.label}</span>;}
function TypeChip({type}){const c=type==="Income"?{bg:"#DCFCE7",fg:"#15803D"}:{bg:"#FEE2E2",fg:"#B91C1C"};return <span style={{display:"inline-flex",padding:"3px 9px",borderRadius:8,fontSize:12,fontWeight:600,background:c.bg,color:c.fg}}>{type}</span>;}

const QUEUE=[
  {checked:false,flag:"RED",  client:"Northwind Logistics",ref:"MNL-0011",type:"Expense",in_:null,        out:"₱400.00",  date:"Jun 3",reason:"Amount unusually high"},
  {checked:false,flag:"RED",  client:"Mariposa Café",     ref:"MC-0088", type:"Income", in_:"₱10,714.29",out:null,       date:"Jun 2",reason:"Unrecognized vendor"},
  {checked:false,flag:"RED",  client:"Sari-Sari Express", ref:"SSE-0041",type:"Expense",in_:null,        out:"₱3,200.00",date:"Jun 2",reason:"Duplicate reference"},
  {checked:false,flag:"YELLOW",client:"Northwind Logistics",ref:"MNL-0010",type:"Expense",in_:null,     out:"₱600.00",  date:"Jun 2",reason:"Missing receipt"},
  {checked:false,flag:"YELLOW",client:"ABC Trading",      ref:"ABC-0055",type:"Income", in_:"₱9,000.00",out:null,       date:"Jun 2",reason:"OCR retry needed"},
  {checked:false,flag:"YELLOW",client:"Cebu Dive Co.",    ref:"CDC-0019",type:"Expense",in_:null,       out:"₱945.00",  date:"Jun 2",reason:""},
  {checked:false,flag:"YELLOW",client:"Mariposa Café",    ref:"MC-0091", type:"Expense",in_:null,       out:"₱615.00",  date:"Jun 2",reason:""},
  {checked:true, flag:"GREEN", client:"Northwind Logistics",ref:"MNL-0009",type:"Expense",in_:null,     out:"₱500.00",  date:"Jun 2",reason:""},
  {checked:true, flag:"GREEN", client:"ABC Trading",      ref:"ABC-0054",type:"Income", in_:"₱600.00", out:null,        date:"Jun 2",reason:""},
  {checked:true, flag:"GREEN", client:"Sari-Sari Express",ref:"SSE-0040",type:"Expense",in_:null,      out:"₱500.00",  date:"Jun 2",reason:""},
  {checked:true, flag:"GREEN", client:"Cebu Dive Co.",    ref:"CDC-0018",type:"Income", in_:"₱200.00", out:null,        date:"Jun 2",reason:""},
  {checked:true, flag:"GREEN", client:"Mariposa Café",    ref:"MC-0090", type:"Expense",in_:null,      out:"₱200.00",  date:"Jun 2",reason:""},
];
const GW="36px 0.7fr 1.1fr 1fr 0.65fr 0.85fr 0.85fr 0.6fr";
const rowBg=(row,i,t)=>row.flag==="RED"?(t.tiers.review.bg):row.flag==="YELLOW"?(t.tiers.check.bg):i%2===0?t.cardAlt:"transparent";
const borderLeft=(row,t)=>row.flag==="RED"?`3px solid ${t.tiers.review.fg}`:row.flag==="YELLOW"?`3px solid ${t.tiers.check.fg}`:"3px solid transparent";

function QueuePage(){
  const [theme,setTheme]=useState("sofia");
  const t=T[theme];
  const greenCount=QUEUE.filter(r=>r.flag==="GREEN").length;
  return(
    <div style={{height:"100%",width:"100%",background:t.surface,color:t.ink,fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",transition:"background .5s,color .5s",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <Nav t={t} theme={theme} setTheme={setTheme}/>
      <div style={{flex:1,overflowY:"auto",background:t.surface}}>
      <div style={{maxWidth:1280,margin:"0 auto",padding:"28px 36px"}}>
        {/* Breadcrumb */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:18,fontSize:13,color:t.muted}}>
          <span style={{cursor:"pointer"}}>Dashboard</span>
          <svg viewBox="0 0 24 24" width={13} height={13} style={{transform:"rotate(-90deg)",color:t.faint}} fill="none" stroke="currentColor" strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          <span style={{fontWeight:600,color:t.ink}}>Review Queue</span>
        </div>
        {/* Header */}
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22}}>
          <div>
            <h1 style={{fontFamily:"'Bricolage Grotesque'",fontWeight:800,fontSize:34,letterSpacing:"-.025em",margin:0,color:t.ink}}>Review Queue</h1>
            <p style={{margin:"5px 0 0",color:t.muted,fontSize:14.5}}>12 documents awaiting your approval</p>
          </div>
        </div>
        {/* Summary cards */}
        <div style={{display:"flex",gap:14,marginBottom:22}}>
          <SCard t={t} label="Total Items" value="12" note="in queue" color={t.ink}/>
          <SCard t={t} label="RED Flags" value="3" note="anomalies flagged" color={t.tiers.review.fg}/>
          <SCard t={t} label="Yellow Flags" value="4" note="needs checking" color={t.tiers.check.fg}/>
          <SCard t={t} label="Green / Ready" value="5" note="pre-sorted for approval" color={t.tiers.ready.fg}/>
        </div>
        {/* Filter bar */}
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
          {["All Clients","All Flags"].map(v=>(
            <div key={v} style={{display:"flex",alignItems:"center",gap:6,height:40,padding:"0 36px 0 14px",borderRadius:11,border:`1.5px solid ${t.line}`,background:t.card,fontSize:13.5,fontWeight:600,color:t.ink,cursor:"pointer",position:"relative",whiteSpace:"nowrap"}}>
              {v}<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:t.faint}}><svg viewBox="0 0 24 24" width={14} height={14} fill="none" stroke="currentColor" strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>
            </div>
          ))}
          <div style={{flex:1}}/>
          <button style={{border:0,borderRadius:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:14,padding:"12px 20px",color:"#fff",background:`linear-gradient(150deg,${t.primary},${t.primaryDeep})`,boxShadow:`0 12px 22px -12px ${t.primary}cc`,display:"inline-flex",alignItems:"center",gap:7}}>
            <Icon name="check" size={15} color="#fff"/> Approve Selected ({greenCount})
          </button>
        </div>
        {/* Table card */}
        <div style={{background:t.card,border:`1px solid ${t.line}`,borderRadius:20,overflow:"hidden",boxShadow:t.shadow}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"18px 24px",borderBottom:`1px solid ${t.line}`}}>
            <span style={{color:t.primary}}><Icon name="queue" size={18}/></span>
            <span style={{fontFamily:"'Bricolage Grotesque'",fontWeight:700,fontSize:16,color:t.ink}}>Queue</span>
            <span style={{fontSize:11.5,fontWeight:800,color:t.primary,background:t.primarySoft,padding:"2px 8px",borderRadius:999}}>12</span>
            <span style={{fontSize:11.5,fontWeight:800,color:t.tiers.review.fg,background:t.tiers.review.bg,border:`1px solid ${t.tiers.review.ring}`,padding:"2px 10px",borderRadius:999}}>3 flagged</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:GW,padding:"12px 24px",fontSize:11,fontWeight:700,color:t.faint,textTransform:"uppercase",letterSpacing:".06em"}}>
            <span/><span>Flag</span><span>Client</span><span>Reference</span><span>Type</span>
            <span style={{color:t.tiers.ready.fg}}>Inflow</span>
            <span style={{color:t.tiers.review.fg}}>Outflow</span>
            <span>Uploaded</span>
          </div>
          {QUEUE.map((row,i)=>(
            <div key={row.ref} style={{display:"grid",gridTemplateColumns:GW,padding:"13px 24px",alignItems:"center",borderTop:`1px solid ${t.lineSoft}`,background:rowBg(row,i,t),borderLeft:borderLeft(row,t),cursor:"pointer"}}>
              <span style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{width:16,height:16,borderRadius:4,border:`2px solid ${row.checked?t.primary:t.line}`,background:row.checked?t.primary:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {row.checked&&<svg viewBox="0 0 24 24" width={10} height={10} fill="none" stroke="#fff" strokeWidth={3} strokeLinecap="round"><path d="M20 6L9 17l-5-5"/></svg>}
                </span>
              </span>
              <span><FlagChip flag={row.flag}/></span>
              <span style={{fontSize:13.5,fontWeight:600,color:t.ink}}>{row.client}</span>
              <span style={{fontSize:13,color:t.muted,fontVariantNumeric:"tabular-nums"}}>{row.ref}</span>
              <span><TypeChip type={row.type}/></span>
              <span style={{fontSize:13.5,fontWeight:600,color:row.in_?t.tiers.ready.fg:t.faint,fontVariantNumeric:"tabular-nums"}}>{row.in_||"—"}</span>
              <span style={{fontSize:13.5,fontWeight:600,color:row.out?t.tiers.review.fg:t.faint,fontVariantNumeric:"tabular-nums"}}>{row.out||"—"}</span>
              <span style={{fontSize:13,color:t.muted}}>{row.date}</span>
            </div>
          ))}
        </div>
        <div style={{height:32}}/>
      </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<QueuePage/>);
</script>
</body>
</html>
