<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sofia Books — Adjusting Entries</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>*{box-sizing:border-box;}html,body{margin:0;height:100%;-webkit-font-smoothing:antialiased;}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px;}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel">
const {useState}=React;
const T={sofia:{surface:"#F6F1E9",card:"#FFFFFF",cardAlt:"#FBF7F1",ink:"#2A2433",muted:"#8A8295",faint:"#B4AEC0",line:"#ECE4D8",lineSoft:"#F2EBE0",primary:"#E2568C",primaryDeep:"#C53C76",primarySoft:"#FBE6EF",chipBg:"#F6F1E9",navBg:"rgba(255,255,255,0.88)",shadow:"0 1px 2px rgba(42,28,60,.04),0 14px 34px -18px rgba(42,28,60,.18)",tiers:{review:{fg:"#C2553D",bg:"#F7E5DD",ring:"#EBCBBE"},check:{fg:"#A9791A",bg:"#F6ECD4",ring:"#E8D5A6"},ready:{fg:"#3C8E6C",bg:"#DEEEE5",ring:"#BCDFCD"},pending:{fg:"#6A5ECF",bg:"#E9E3F8",ring:"#D3C9EF"}}},yoda:{surface:"#13111C",card:"#1C1928",cardAlt:"#211D2E",ink:"#ECEAF2",muted:"#9A93AE",faint:"#6E6880",line:"#2C2838",lineSoft:"#252132",primary:"#7C9CFF",primaryDeep:"#5B7CF0",primarySoft:"rgba(124,156,255,.14)",chipBg:"#211D2E",navBg:"rgba(22,20,32,0.85)",shadow:"0 1px 2px rgba(0,0,0,.3),0 18px 40px -20px rgba(0,0,0,.6)",tiers:{review:{fg:"#F0987B",bg:"rgba(225,120,90,.15)",ring:"rgba(225,120,90,.32)"},check:{fg:"#E8C06B",bg:"rgba(220,175,80,.14)",ring:"rgba(220,175,80,.30)"},ready:{fg:"#6FD6A6",bg:"rgba(80,200,150,.14)",ring:"rgba(80,200,150,.30)"},pending:{fg:"#A6B7FF",bg:"rgba(124,156,255,.16)",ring:"rgba(124,156,255,.34)"}}}};
function Icon({name,size=18,stroke=1.7,color}){const p={fill:"none",stroke:color||"currentColor",strokeWidth:stroke,strokeLinecap:"round",strokeLinejoin:"round"};const paths={entries:<><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" {...p}/><path d="M14 2v6h6M16 13H8M16 17H8" {...p}/></>,dashboard:<><rect x="3" y="3" width="7" height="9" rx="1.5" {...p}/><rect x="14" y="3" width="7" height="5" rx="1.5" {...p}/><rect x="14" y="12" width="7" height="9" rx="1.5" {...p}/><rect x="3" y="16" width="7" height="5" rx="1.5" {...p}/></>,queue:<><path d="M4 6h16M4 12h16M4 18h10" {...p}/></>,clients:<><circle cx="9" cy="8" r="3.2" {...p}/><path d="M3.5 19c.8-3 3-4.6 5.5-4.6S13.7 16 14.5 19" {...p}/></>,reports:<><path d="M5 19V5M5 19h14" {...p}/><path d="M9 15v-3M13 15V9M17 15v-5" {...p}/></>,bell:<><path d="M6 9a6 6 0 1112 0c0 5 2 6 2 6H4s2-1 2-6z" {...p}/><path d="M10 20a2 2 0 004 0" {...p}/></>,chevron:<><path d="M6 9l6 6 6-6" {...p}/></>,plus:<><path d="M12 5v14M5 12h14" {...p}/></>,};return <svg viewBox="0 0 24 24" width={size} height={size}>{paths[name]||null}</svg>;}
function Nav({t,theme,setTheme}){const nav=[{l:"Dashboard"},{l:"Queue",badge:7},{l:"Adj. Entries",active:true},{l:"My Clients"},{l:"Reports"}];return(<header style={{display:"flex",alignItems:"center",gap:20,padding:"0 36px",height:70,borderBottom:`1px solid ${t.line}`,background:t.navBg,backdropFilter:"blur(12px)",flex:"none",transition:"background .5s"}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{width:32,height:32,borderRadius:10,display:"grid",placeItems:"center",background:`linear-gradient(150deg,${t.primary},${t.primaryDeep})`,flex:"none"}}><svg viewBox="0 0 24 24" width={18} height={18}><circle cx="12" cy="14.6" r="5.1" fill="#fff"/><circle cx="6.4" cy="8.6" r="2.25" fill="#fff"/><circle cx="12" cy="6.1" r="2.25" fill="#fff"/><circle cx="17.6" cy="8.6" r="2.25" fill="#fff"/></svg></span><span style={{fontFamily:"'Bricolage Grotesque'",fontWeight:700,fontSize:16,color:t.ink}}>Sofia Books</span></div><nav style={{display:"flex",gap:3,marginLeft:6}}>{nav.map(n=><span key={n.l} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 13px",borderRadius:10,fontSize:13.5,fontWeight:n.active?700:600,cursor:"pointer",color:n.active?t.primary:t.muted,background:n.active?t.primarySoft:"transparent"}}>{n.l}{n.badge&&<span style={{fontSize:10.5,fontWeight:800,color:"#fff",background:t.tiers.review.fg,borderRadius:999,padding:"1px 6px"}}>{n.badge}</span>}</span>)}</nav><div style={{flex:1}}/><div style={{position:"relative",display:"flex",padding:4,borderRadius:999,background:theme==="sofia"?"#EFE7DA":"#211D2E",border:`1px solid ${t.line}`}}><span style={{position:"absolute",top:4,bottom:4,width:"calc(50% - 4px)",borderRadius:999,background:`linear-gradient(150deg,${t.primary},${t.primaryDeep})`,left:4,transform:theme==="sofia"?"translateX(0)":"translateX(100%)",transition:"transform .32s cubic-bezier(.34,1.3,.5,1)"}}/>{["sofia","yoda"].map(k=><button key={k} onClick={()=>setTheme(k)} style={{position:"relative",zIndex:2,border:0,background:"transparent",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,padding:"5px 14px",borderRadius:999,color:theme===k?"#fff":t.muted,transition:"color .25s"}}>{k==="sofia"?"Sofia":"Yoda"}</button>)}</div><button style={{width:38,height:38,borderRadius:10,border:`1px solid ${t.line}`,background:t.card,color:t.muted,display:"grid",placeItems:"center",cursor:"pointer",position:"relative"}}><Icon name="bell" size={18}/><span style={{position:"absolute",top:9,right:9,width:6,height:6,borderRadius:999,background:t.primary,border:`2px solid ${t.card}`}}/></button><span style={{width:36,height:36,borderRadius:10,display:"grid",placeItems:"center",fontSize:12,fontWeight:800,color:t.primary,background:t.primarySoft,border:`1px solid ${t.line}`}}>MS</span></header>);}
function SCard({t,label,value,note,color}){return(<div style={{flex:1,background:t.card,border:`1px solid ${t.line}`,borderRadius:16,padding:"16px 20px",boxShadow:t.shadow,transition:"background .5s"}}><div style={{fontSize:11,fontWeight:700,color:t.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>{label}</div><div style={{fontFamily:"'Bricolage Grotesque'",fontWeight:800,fontSize:26,letterSpacing:"-.025em",color:color||t.ink,lineHeight:1}}>{value}</div>{note&&<div style={{fontSize:12,color:t.faint,marginTop:5}}>{note}</div>}</div>);}
const STATUS_TIER={"Pending":"check","Approved":"ready","Rejected":"review","Draft":"pending"};
function StatusChip({t,s}){const c=t.tiers[STATUS_TIER[s]||"pending"];return <span style={{display:"inline-flex",alignItems:"center",padding:"4px 12px",borderRadius:999,fontSize:12.5,fontWeight:700,color:c.fg,background:c.bg,border:`1px solid ${c.ring}`}}>{s}</span>;}
function TypeChip({t,type}){return <span style={{display:"inline-flex",padding:"3px 10px",borderRadius:8,fontSize:12,fontWeight:600,background:t.tiers.pending.bg,color:t.tiers.pending.fg,border:`1px solid ${t.tiers.pending.ring}`}}>{type}</span>;}

const ENTRIES=[
  {type:"Accrual",client:"Northwind Logistics",desc:"Accrued rent expense – May",date:"Jun 2",debit:"₱45,000",credit:"₱45,000",status:"Pending"},
  {type:"Prepayment",client:"Mariposa Café",desc:"Prepaid insurance amortization",date:"Jun 2",debit:"₱3,200",credit:"₱3,200",status:"Pending"},
  {type:"Depreciation",client:"ABC Trading Corp.",desc:"Monthly depreciation – equipment",date:"Jun 1",debit:"₱8,750",credit:"₱8,750",status:"Pending"},
  {type:"Correction",client:"Sari-Sari Express",desc:"Reclassify misc to supplies expense",date:"May 31",debit:"₱1,500",credit:"₱1,500",status:"Pending"},
  {type:"Accrual",client:"Cebu Dive Co.",desc:"Accrued salaries payable",date:"May 31",debit:"₱62,000",credit:"₱62,000",status:"Pending"},
  {type:"Accrual",client:"Northwind Logistics",desc:"Utilities payable – May",date:"May 30",debit:"₱12,400",credit:"₱12,400",status:"Approved"},
  {type:"Depreciation",client:"Mariposa Café",desc:"Kitchen equipment depreciation",date:"May 30",debit:"₱4,167",credit:"₱4,167",status:"Approved"},
  {type:"Prepayment",client:"ABC Trading Corp.",desc:"Prepaid advertising – Q2",date:"May 28",debit:"₱15,000",credit:"₱15,000",status:"Approved"},
  {type:"Correction",client:"Northwind Logistics",desc:"Reverse duplicate entry OR-0052",date:"May 27",debit:"₱9,000",credit:"₱9,000",status:"Approved"},
  {type:"Accrual",client:"Sari-Sari Express",desc:"Accrued interest on loan",date:"May 25",debit:"₱2,800",credit:"₱2,800",status:"Approved"},
  {type:"Accrual",client:"Cebu Dive Co.",desc:"Deferred revenue – advance payments",date:"May 20",debit:"₱18,500",credit:"₱18,500",status:"Approved"},
  {type:"Draft",client:"Mariposa Café",desc:"[Draft] Franchise fee amortization",date:"Jun 3",debit:"—",credit:"—",status:"Draft"},
  {type:"Draft",client:"ABC Trading Corp.",desc:"[Draft] Year-end accrual review",date:"Jun 3",debit:"—",credit:"—",status:"Draft"},
];
const GW="0.7fr 1.1fr 2fr 0.65fr 0.85fr 0.85fr 0.75fr";

function AdjEntries(){
  const [theme,setTheme]=useState("sofia");
  const t=T[theme];
  const pending=ENTRIES.filter(e=>e.status==="Pending").length;
  const approved=ENTRIES.filter(e=>e.status==="Approved").length;
  const draft=ENTRIES.filter(e=>e.status==="Draft").length;
  return(
    <div style={{height:"100%",width:"100%",background:t.surface,color:t.ink,fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",transition:"background .5s,color .5s",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <Nav t={t} theme={theme} setTheme={setTheme}/>
      <div style={{flex:1,overflowY:"auto",background:t.surface}}>
      <div style={{maxWidth:1280,margin:"0 auto",padding:"28px 36px"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:18,fontSize:13,color:t.muted}}>
          <span style={{cursor:"pointer"}}>Dashboard</span>
          <svg viewBox="0 0 24 24" width={13} height={13} style={{transform:"rotate(-90deg)"}} fill="none" stroke="currentColor" strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          <span style={{fontWeight:600,color:t.ink}}>Adjusting Entries</span>
        </div>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22}}>
          <div>
            <h1 style={{fontFamily:"'Bricolage Grotesque'",fontWeight:800,fontSize:34,letterSpacing:"-.025em",margin:0,color:t.ink}}>Adjusting Entries</h1>
            <p style={{margin:"5px 0 0",color:t.muted,fontSize:14.5}}>All entries for your assigned clients</p>
          </div>
          <button style={{border:0,borderRadius:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:14,padding:"12px 20px",color:"#fff",background:`linear-gradient(150deg,${t.primary},${t.primaryDeep})`,boxShadow:`0 12px 22px -12px ${t.primary}cc`,display:"inline-flex",alignItems:"center",gap:7,marginTop:4}}>
            <Icon name="plus" size={15} color="#fff"/> New Entry
          </button>
        </div>
        <div style={{display:"flex",gap:14,marginBottom:22}}>
          <SCard t={t} label="Total Entries" value={String(ENTRIES.length)} note="all statuses" color={t.ink}/>
          <SCard t={t} label="Pending" value={String(pending)} note="awaiting approval" color={t.tiers.check.fg}/>
          <SCard t={t} label="Approved" value={String(approved)} note="this period" color={t.tiers.ready.fg}/>
          <SCard t={t} label="Draft" value={String(draft)} note="not submitted" color={t.tiers.pending.fg}/>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20}}>
          {["All Clients","All Statuses"].map(v=>(
            <div key={v} style={{display:"flex",alignItems:"center",gap:6,height:40,padding:"0 36px 0 14px",borderRadius:11,border:`1.5px solid ${t.line}`,background:t.card,fontSize:13.5,fontWeight:600,color:t.ink,cursor:"pointer",position:"relative",whiteSpace:"nowrap"}}>
              {v}<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:t.faint}}><svg viewBox="0 0 24 24" width={14} height={14} fill="none" stroke="currentColor" strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>
            </div>
          ))}
          <div style={{flex:1}}/><span style={{fontSize:13,color:t.muted,fontWeight:500}}>{ENTRIES.length} entries</span>
        </div>
        <div style={{background:t.card,border:`1px solid ${t.line}`,borderRadius:20,overflow:"hidden",boxShadow:t.shadow}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"18px 24px",borderBottom:`1px solid ${t.line}`}}>
            <span style={{color:t.primary}}><Icon name="entries" size={18}/></span>
            <span style={{fontFamily:"'Bricolage Grotesque'",fontWeight:700,fontSize:16,color:t.ink}}>Adjusting Entries</span>
            <span style={{fontSize:11.5,fontWeight:800,color:t.primary,background:t.primarySoft,padding:"2px 8px",borderRadius:999}}>{ENTRIES.length}</span>
            {pending>0&&<span style={{fontSize:11.5,fontWeight:800,color:t.tiers.check.fg,background:t.tiers.check.bg,border:`1px solid ${t.tiers.check.ring}`,padding:"2px 10px",borderRadius:999}}>{pending} pending</span>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:GW,padding:"12px 24px",fontSize:11,fontWeight:700,color:t.faint,textTransform:"uppercase",letterSpacing:".06em"}}>
            <span>Type</span><span>Client</span><span>Description</span><span>Date</span>
            <span style={{color:t.tiers.ready.fg}}>Debit</span>
            <span style={{color:t.tiers.review.fg}}>Credit</span>
            <span>Status</span>
          </div>
          {ENTRIES.map((e,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:GW,padding:"13px 24px",alignItems:"center",borderTop:`1px solid ${t.lineSoft}`,background:i%2===0?t.cardAlt:"transparent",cursor:"pointer"}}>
              <span><TypeChip t={t} type={e.type}/></span>
              <span style={{fontSize:13.5,fontWeight:600,color:t.ink}}>{e.client}</span>
              <span style={{fontSize:13,color:t.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.desc}</span>
              <span style={{fontSize:13,color:t.muted}}>{e.date}</span>
              <span style={{fontSize:13.5,fontWeight:600,color:e.debit!=="—"?t.tiers.ready.fg:t.faint,fontVariantNumeric:"tabular-nums"}}>{e.debit}</span>
              <span style={{fontSize:13.5,fontWeight:600,color:e.credit!=="—"?t.tiers.review.fg:t.faint,fontVariantNumeric:"tabular-nums"}}>{e.credit}</span>
              <span><StatusChip t={t} s={e.status}/></span>
            </div>
          ))}
        </div>
        <div style={{height:32}}/>
      </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<AdjEntries/>);
</script>
</body>
</html>
